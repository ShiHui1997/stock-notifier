name: Stock Notifier V2 - 尾盘分析 (14:20)

on:
  schedule:
    - cron: '20 6 * * 1-5'  # 北京时间 14:20 = UTC 6:20 (周一至周五)
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas numpy requests
      
      - name: Run afternoon analysis
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PERIOD: 尾盘
        run: python stock_notifier_v2.py
      
      - name: Commit updated config (if changed)
        run: |
          git config user.name "stock-bot"
          git config user.email "stock-bot[bot]@users.noreply.github.com"
          git add holdings_config.json
          git diff --cached --quiet && exit 0
          git commit -m "自动更新: $(date +'%Y-%m-%d %H:%M')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
