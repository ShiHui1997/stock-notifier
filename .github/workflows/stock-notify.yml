name: Stock Morning Report
on:
  schedule:
    # UTC 1:00 = 北京时间 9:00（早盘）
    - cron: '0 1 * * 1-5'
    # UTC 6:20 = 北京时间 14:20（尾盘）
    - cron: '20 6 * * 1-5'
  workflow_dispatch:  # 支持手动触发测试

jobs:
  morning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine period
        id: period
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" -lt 3 ]; then
            echo "period=早盘" >> $GITHUB_OUTPUT
          else
            echo "period=尾盘" >> $GITHUB_OUTPUT
          fi

      - name: Run stock notifier (Morning)
        if: github.event.schedule == '0 1 * * 1-5' || github.event_name == 'workflow_dispatch'
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PERIOD: 早盘
        run: python3 stock_notifier.py

      - name: Run stock notifier (Afternoon)
        if: github.event.schedule == '20 6 * * 1-5'
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PERIOD: 尾盘
        run: python3 stock_notifier.py
