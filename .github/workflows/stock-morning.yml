name: Stock Morning Report (早盘 9:00)
on:
  schedule:
    - cron: '0 1 * * 1-5'
  workflow_dispatch:
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run stock notifier
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PERIOD: 早盘
        run: python3 stock_notifier.py
