name: Stock Morning Report (早盘 9:00)

on:
  schedule:
    # UTC 1:00 = 北京时间 9:00
   - cron: '20 1 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run stock notifier + process trades
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          TRADE_TOKEN: ${{ secrets.TRADE_TOKEN }}
          PERIOD: 早盘
        run: python3 stock_notifier.py

      - name: Commit updated config (if changed)
        run: |
          git config user.name "stock-bot"
          git config user.email "stock-bot[bot]@users.noreply.github.com"
          git add holdings_config.json pending_trades.json 2>/dev/null || true
          git diff --cached --quiet && exit 0
          git commit -m "自动更新: 处理交易记录"
          git push
